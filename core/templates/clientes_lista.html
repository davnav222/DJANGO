{% extends "base.html" %}
{% block contenido %}
<h3>Nuestros Clientes</h3>
<table class="table table-hover bg-white shadow-sm">
    <thead class="table-dark"><tr><th>ID</th><th>Nombre</th><th>Acción</th></tr></thead>
    <tbody>
        {% for c in clientes %}
        <tr><td>{{ c.id }}</td><td>{{ c.nombre }}</td>
        <td><a href="{% url 'borrar_cliente' c.id %}" class="btn btn-danger btn-sm">Eliminar</a></td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
