{% extends "base.html" %}

{% block titulo_pantalla %}Alta de Producto{% endblock %}

{% block contenido %}
<h3 class="mb-4">Nuevo Producto</h3>

<form method="POST">
    {% csrf_token %}
    
    <div class="mb-3">
        <label class="form-label fw-bold">Nombre del Producto:</label>
        <input type="text" name="nombre" class="form-control rounded-4" placeholder="Ej: Teclado Mecánico" required>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Precio (€):</label>
        <input type="number" step="0.01" name="precio" class="form-control rounded-4" placeholder="0.00" required>
    </div>

<div class="mb-3">
    <label class="form-label fw-bold">Stock Inicial (Unidades):</label>
    <input type="number" name="stock" class="form-control rounded-4" value="0" min="0" required>
</div>

    <div class="mb-4">
        <label class="form-label fw-bold">Asignar a Sección:</label>
        <select name="seccion" class="form-select rounded-4" required>
            <option value="">Selecciona una sección...</option>
            {% for s in secciones %}
                <option value="{{ s.id }}">{{ s.nombre }}</option>
            {% endfor %}
        </select>
        <div class="form-text mt-2 text-dark">
            * Si no aparece ninguna, primero debes <a href="{% url 'alta_seccion' %}" class="fw-bold text-decoration-none">crear una sección</a>.
        </div>
    </div>

    <button type="submit" class="btn btn-dark w-100 rounded-4 py-2 shadow">GUARDAR PRODUCTO</button>
</form>
{% endblock %}
