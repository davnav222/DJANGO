{% extends "base.html" %}
{% block contenido %}
<div class="card p-4 border-0 bg-white shadow-sm">
    <h3>Crear Nueva Sección</h3>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3"><input type="text" name="nombre" class="form-control" placeholder="Nombre de sección" required></div>
        <button type="submit" class="btn btn-warning">Guardar</button>
    </form>
</div>
{% endblock %}
