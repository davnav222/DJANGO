{% extends "base.html" %}
{% block contenido %}
<h3>Listado de Secciones</h3>
<table class="table table-hover bg-white shadow-sm">
    <thead class="table-dark"><tr><th>ID</th><th>Nombre</th><th>Acción</th></tr></thead>
    <tbody>
        {% for s in secciones %}
        <tr><td>{{ s.id }}</td><td>{{ s.nombre }}</td>
        <td><a href="{% url 'borrar_seccion' s.id %}" class="btn btn-danger btn-sm">Borrar</a></td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
